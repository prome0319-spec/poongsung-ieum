<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" fill="none">
  <!-- Sky gradient -->
  <rect width="360" height="200" fill="url(#skyGrad)"/>

  <!-- Clouds -->
  <ellipse cx="60" cy="50" rx="34" ry="16" fill="white" opacity="0.6"/>
  <ellipse cx="80" cy="44" rx="24" ry="14" fill="white" opacity="0.6"/>
  <ellipse cx="290" cy="60" rx="28" ry="13" fill="white" opacity="0.5"/>
  <ellipse cx="315" cy="55" rx="20" ry="11" fill="white" opacity="0.5"/>

  <!-- Ground -->
  <path d="M0 150 Q90 140 180 145 Q270 150 360 140 L360 200 L0 200 Z" fill="#d1e8c4" opacity="0.7"/>

  <!-- Church building -->
  <rect x="140" y="100" width="80" height="70" rx="4" fill="#f8f9ff"/>
  <rect x="140" y="100" width="80" height="70" rx="4" stroke="#cdd5e8" stroke-width="1.5"/>

  <!-- Church roof -->
  <path d="M134 104 L180 72 L226 104 Z" fill="#e0e8f8" stroke="#cdd5e8" stroke-width="1.5"/>

  <!-- Cross on roof -->
  <rect x="177" y="60" width="6" height="22" rx="3" fill="#2f6bff" opacity="0.8"/>
  <rect x="170" y="68" width="20" height="6" rx="3" fill="#2f6bff" opacity="0.8"/>

  <!-- Door -->
  <path d="M167 170 L167 130 Q180 120 193 130 L193 170 Z" fill="#d0d9ee" stroke="#b8c4de" stroke-width="1"/>

  <!-- Windows -->
  <rect x="148" y="116" width="18" height="22" rx="9" fill="#ddeeff" stroke="#b8c8e8" stroke-width="1"/>
  <rect x="194" y="116" width="18" height="22" rx="9" fill="#ddeeff" stroke="#b8c8e8" stroke-width="1"/>

  <!-- Trees -->
  <rect x="108" y="142" width="7" height="28" rx="2" fill="#8aaf74"/>
  <ellipse cx="111" cy="138" rx="16" ry="18" fill="#5a8f4a"/>

  <rect x="245" y="146" width="7" height="24" rx="2" fill="#8aaf74"/>
  <ellipse cx="249" cy="142" rx="14" ry="16" fill="#5a8f4a"/>

  <!-- People (silhouettes) -->
  <circle cx="218" cy="160" r="6" fill="#93aef5" opacity="0.8"/>
  <path d="M212 180 Q218 168 224 180" fill="#93aef5" opacity="0.8"/>

  <circle cx="230" cy="158" r="6" fill="#b5c9f8" opacity="0.8"/>
  <path d="M224 180 Q230 166 236 180" fill="#b5c9f8" opacity="0.8"/>

  <!-- Sun rays (small) -->
  <circle cx="310" cy="35" r="18" fill="#FEE500" opacity="0.35"/>
  <circle cx="310" cy="35" r="12" fill="#FEE500" opacity="0.55"/>

  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d6e8ff"/>
      <stop offset="100%" stop-color="#eef6f0"/>
    </linearGradient>
  </defs>
</svg>
